<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <defs>
    <!-- Glow gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7ac6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7ac6"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>

    <!-- Rays gradient -->
    <linearGradient id="rayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7ac6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Breathing glow -->
  <circle cx="50" cy="50" r="42" fill="url(#glow)">
    <animate attributeName="r" values="40;44;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Enso (main broken ring) -->
  <circle 
    cx="50" 
    cy="50" 
    r="28" 
    fill="none" 
    stroke="url(#ringGrad)" 
    stroke-width="3"
    stroke-linecap="round"
    stroke-dasharray="150 40"
  />

  <!-- Inner subtle ring -->
  <circle cx="50" cy="50" r="18" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Light rays -->
  <g opacity="0.5">
    <line x1="50" y1="5" x2="50" y2="20" stroke="url(#rayGrad)" stroke-width="1"/>
    <line x1="50" y1="80" x2="50" y2="95" stroke="url(#rayGrad)" stroke-width="1"/>
    <line x1="5" y1="50" x2="20" y2="50" stroke="url(#rayGrad)" stroke-width="1"/>
    <line x1="80" y1="50" x2="95" y2="50" stroke="url(#rayGrad)" stroke-width="1"/>
  </g>

  <!-- Floating particles -->
  <circle cx="50" cy="22" r="1.5" fill="#ff7ac6">
    <animate attributeName="cy" values="22;18;22" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="50" cy="78" r="1.5" fill="#7b61ff">
    <animate attributeName="cy" values="78;82;78" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Central bindu -->
  <circle cx="50" cy="50" r="3" fill="#ff7ac6">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
  </circle>

</svg>